global:
  Keywords:
    - Mesopotamia
    - Near_East
    - Empire
  Params:
    - position:2.5

# Mesopotamian and ancient Near Eastern empires and periods.
# Period spans for the major polities of Mesopotamia and the surrounding
# Near East, from the Akkadian Empire through the Neo-Babylonian (Chaldean)
# Empire. Dates follow the conventional "middle chronology" and are
# approximate; the "# CHECK" comment marks labels whose ranges are
# especially uncertain or scholar-dependent.
# Egypt, the Achaemenid Persians, the Israelite/Judahite kingdoms, and the
# Steppe peoples are intentionally omitted (covered in other files).
# fill: alternates two bronze/tan shades to evoke ancient Mesopotamia.
# position: values stagger contemporaneous, overlapping polities onto
# separate rows; they are a first pass and may need tuning after a render.

entries:

- Label: Akkadian Empire  # CHECK
  Start: c. -2334
  End: c. -2154
  Params:
    - fill:#8a6d3b;
    - position:2.5

- Label: Third Dynasty of Ur (Ur III)  # CHECK
  Start: c. -2112
  End: c. -2004
  Params:
    - fill:#b08d57;
    - position:2.5

- Label: Old Assyrian Period
  Start: c. -2025
  End: c. -1378
  Params:
