# Historical periods of Japan (Yayoi through Shōwa, c. 300 BCE – 1989 CE).
# Dates are approximate; period boundaries vary between sources (e.g. the
# Yayoi start and the Azuchi–Momoyama range are debated). The "# CHECK"
# comment marks labels whose dates should be verified later.
# Most eras are sequential and sit on the base row; Sengoku overlaps the
# Muromachi (Ashikaga) period and is staggered to a separate position so the
# bars do not collide.

entries:

- Label: Yayoi  # CHECK
  Start: c. -0300
  End: c. 0300
  Params:
    - position:4.5
    - fill:#a32638;

