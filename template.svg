rect.Hasmonean_Dynasty.Ethnarch.odd { fill: #3a7e7e; }
rect.Hasmonean_Dynasty.High_Priest_Only.even { fill: #5e5e1a; }
rect.Hasmonean_Dynasty.High_Priest_Only.odd { fill: #7e7e3a; }

/*******************************
** Herodian Kingdom **
*******************************/

rect.Herodian_Dynasty.even { fill: #6e1f8c; }
rect.Herodian_Dynasty.odd { fill: #9148ad; }
rect.Herodian_Dynasty.King.even { fill: #6e1f8c; }
rect.Herodian_Dynasty.King.odd { fill: #9148ad; }
rect.Herodian_Dynasty.Governor.even { fill: #2a4a8f; }
rect.Herodian_Dynasty.Governor.odd { fill: #4a6aaf; }
rect.Herodian_Dynasty.Procurator.even { fill: #8f1a1a; }
rect.Herodian_Dynasty.Procurator.odd { fill: #af3a3a; }
rect.Herodian_Dynasty.Tetrarch.even { fill: #1a6b6b; }
rect.Herodian_Dynasty.Tetrarch.odd { fill: #3a8b8b; }
rect.Herodian_Dynasty.Ethnarch.even { fill: #5a6b1a; }
rect.Herodian_Dynasty.Ethnarch.odd { fill: #7a8b3a; }

/*******************************
** Achaemenid rulers **
*******************************/

rect.Achaemenid_Dynasty.even { fill: #005f73; }
rect.Achaemenid_Dynasty.odd { fill: #0a9396; }
rect.Achaemenid_Dynasty.Unconfirmed.even { fill: #7ab8c0; }
rect.Achaemenid_Dynasty.Unconfirmed.odd { fill: #9dcdd4; }

/*******************************
** Ancient Greek lives **
*******************************/

rect.Ancient_Greece.Life { fill : #3ed1b6; }

/*******************************
** Roman Late Republic Lives **
*******************************/

/*******************
** Roman emperors **
*******************/

/* Main dynasties alternate imperial purple and Tyrian crimson; the short
** transitional periods (Year of N Emperors, Crisis, Last Western) use an
** olive-gold so they stand out against the dynasties on either side. */
rect.Julio_Claudian_Dynasty.even { fill : #5a1e8f; }
rect.Julio_Claudian_Dynasty.odd { fill : #7d40b0; }
rect.Year_of_the_Four_Emperors.even { fill : #b08a1e; }
rect.Year_of_the_Four_Emperors.odd { fill : #d4ab3e; }
rect.Flavian_Dynasty.even { fill : #9c1d3f; }
rect.Flavian_Dynasty.odd { fill : #c0445f; }
rect.Nerva_Antonine_Dynasty.even { fill : #5a1e8f; }
rect.Nerva_Antonine_Dynasty.odd { fill : #7d40b0; }
rect.Year_of_the_Five_Emperors.even { fill : #b08a1e; }
rect.Year_of_the_Five_Emperors.odd { fill : #d4ab3e; }
rect.Severan_Dynasty.even { fill : #9c1d3f; }
rect.Severan_Dynasty.odd { fill : #c0445f; }
rect.Crisis_of_the_Third_Century.even { fill : #b08a1e; }
rect.Crisis_of_the_Third_Century.odd { fill : #d4ab3e; }
rect.Tetrarchy.even { fill : #5a1e8f; }
rect.Tetrarchy.odd { fill : #7d40b0; }
rect.Constantinian_Dynasty.even { fill : #9c1d3f; }
rect.Constantinian_Dynasty.odd { fill : #c0445f; }
rect.Valentinian_Dynasty.even { fill : #5a1e8f; }
rect.Valentinian_Dynasty.odd { fill : #7d40b0; }
rect.Theodosian_Dynasty.even { fill : #9c1d3f; }
rect.Theodosian_Dynasty.odd { fill : #c0445f; }
rect.Last_Western_Emperors.even { fill : #b08a1e; }
rect.Last_Western_Emperors.odd { fill : #d4ab3e; }

/************
** Wars **
************/

rect.War.Global { fill : #767d98; }
rect.War.USA { fill : #04208f; }
rect.War.Rome { fill : #c81d1a; }

/***********
** Events **
***********/

line.Battle { stroke: #8b1a00; stroke-width: 2; }

text.Event {
    text-anchor: middle;
    dominant-baseline: middle;
    font-family: Palatino;
    }

/*********************
** Final formatting **
*********************/

text.outside_label {
    fill: #000000;
}
</style>

<!-- Crop marks and debug elements -->
<g>
${debug_corners}
<!-- Top left crop marks -->
<g>
<rect fill="#000000" stroke="none" x="23" y="8" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="8" y="23" width="12" height="1"/>
</g>
<!-- Top right crop marks -->
<g>
<rect fill="#000000" stroke="none" x="1032" y="8" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="1036" y="23" width="12" height="1"/>
</g>
<!-- Bottom left crop marks -->
<g>
<rect fill="#000000" stroke="none" x="23" y="796" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="8" y="792" width="12" height="1"/>
</g>
<!-- Bottom right crop marks -->
<g>
<rect fill="#000000" stroke="none" x="1032" y="796" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="1036" y="792" width="12" height="1"/>
</g>
</g>

<!-- Year labels and backgrounds -->
<g>
${year_labels}
</g>

<!-- Year markers at 50-year intervals -->
${year_markers}

<!-- Timeline boxes -->
<g>
${timeline_boxes}
</g>

</svg>
