# The 36 sultans of the Ottoman Empire, from Osman I (c. 1299) through
# Mehmed VI (deposed 1922), each shown as a reign span (Start/End) with
# birth/death dates (DOB/DOD).
#
# This file is the per-ruler REIGN LIST and is complementary to the single
# Ottoman Empire PERIOD SPAN that already appears in Islamic_caliphates.yaml;
# it is not a duplicate of it.
#
# Ottoman reigns are strictly sequential, so all entries sit on the base
# position:3.5 set in global Params (no overlaps expected). Row 2.5 is
# reserved by British_monarchs.yaml, which overlaps in time.
#
# Dates: extended ISO 8601, years zero-padded to 4 digits. Approximate
# dates use a quoted 'c. ' prefix. Year-only is used where the day is
# unknown. A '# CHECK' comment marks labels with uncertain dates (notably
# the early sultans' birth dates and the foundational reign of Osman I).
#
# Mustafa I reigned twice (1617-1618 and 1622-1623); he is shown here as a
# single span covering his first accession through his second deposition.

global:
  Keywords:
    - Ottoman
    - Sultan
    - Reign
  Params:
    - position:3.5

entries:

- Label: Osman I  # CHECK
  Start: 'c. 1299'
  End: 'c. 1323'
  DOB: 'c. 1255'
  DOD: 'c. 1323'
  Keywords:
    - House_of_Osman

- Label: Orhan  # CHECK
  Start: 'c. 1323'
  End: 1362
  DOB: 'c. 1281'
  DOD: 1362
  Keywords:
    - House_of_Osman

- Label: Murad I
