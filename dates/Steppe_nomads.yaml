# Steppe nomad peoples, khanates, and notable rulers (c. 700 BC – early 16th c.)
# Tiered detail: most famous rulers get full lives (reign + DOB/DOD), mid-tier
# khans get reigns only, and lesser-known polities appear as period spans.
# Dates are approximate and drawn from rough attested ranges; the "# CHECK"
# comment on each label marks dates that should be verified later.
# Note: the Yuan dynasty is intentionally omitted here as it already appears in
# Chinese_dynasties.yaml.
# position: values group overlapping contemporaneous khanates onto separate
# rows; they may need tuning after a first render.

