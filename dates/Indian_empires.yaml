# Major empires and dynasties of the Indian subcontinent (South Asia),
# c. 2600 BCE – 1849 CE. Entries are period spans with two alternating
# saffron/rose shades (#9c3b6e and #c25c8f), distinct from China's orange.
# Dates are approximate and drawn from rough attested/scholarly ranges; the
# "# CHECK" comment on a label marks dates that should be verified later.
# The Indus Valley mature phase mostly predates the 1740 BCE canvas but is
# included with c. dates anyway.
# position: values group overlapping contemporaneous polities (northern
# empires vs. Deccan/southern dynasties) onto separate rows; they may need
# tuning after a first render. Base row is 24.5; band ~24.5–28.5.

entries:

- Label: Indus Valley (Mature Harappan)  # CHECK
  Start: c. -2600
  End: c. -1900
  Params:
    - fill:#9c3b6e;
    - position:24.5

