# Emperors of the Eastern Roman / Byzantine Empire, from the end of the
# Theodosian line covered in Roman_emperors.yaml (which runs through Arcadius,
# Theodosius II, and Marcian) down to the fall of Constantinople in 1453.
#
# REIGN-LIST format (see British_monarchs.yaml): each entry gives a reign
# Start/End plus DOB/DOD where known, with the dynasty/house carried in
# Keywords. Coverage is the major and notable emperors plus enough connective
# reigns to show the principal dynasties: Leonid, Justinian, Heraclian,
# Isaurian (Syrian), Amorian, Macedonian, Komnenian, Angelid, the Nicaean
# Laskarids of the empire in exile, and the Palaiologoi. Minor and ephemeral
# usurpers are omitted.
#
# Reigns are sequential, so the single base row in global Params works for
# nearly all entries; co-emperors / overlapping rivals get a separate
# position: so their bars do not collide. Approximate dates use a quoted
# 'c. ' prefix; uncertain dates are flagged with a trailing # CHECK.

global:
  Keywords:
    - Byzantine
    - Emperor
    - Reign
  Params:
    - position:0.5

