# Point-in-time technology milestones: the invention or first achievement of a
# significant technology, from prehistory to the present day. Positions cycle
# through a band (15/17/19/21) so that markers with nearby dates are vertically
# separated and their labels do not overlap, the same way American_events.yaml
# and Battles.yaml stagger their lanes. Lives of inventors live elsewhere and
# are not duplicated here. Prehistoric dates are necessarily approximate.
