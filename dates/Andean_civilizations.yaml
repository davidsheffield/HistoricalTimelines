# Pre-Columbian Andean civilizations of South America (Peru/Bolivia region).
# Period spans of major cultures, polities, and empires from the Caral-Supe
# (Norte Chico) horizon through the Inca Empire (Tawantinsuyu).
# Andean chronology is fuzzy and varies by source; most start/end dates are
# approximate and carry a "c. " prefix. The "# CHECK" comment on uncertain
# labels marks dates that should be verified later.
# Norte Chico / Caral mostly predates the 1740 BCE canvas and is included with
# c. dates for context.
# Many of these cultures were contemporaneous; position: values group
# overlapping spans onto separate rows so the bars do not collide. They may
# need tuning after a first render.

entries:

