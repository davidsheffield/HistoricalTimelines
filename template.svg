<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="1056" height="816" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>
rect { stroke: none; }

text.Reign,
text.Life {
    text-anchor: middle;
    dominant-baseline: middle;
    }
text.Reign,
text.Life {
    font-family: Palatino;
    fill: #ffffff;
    }

/******************
** US presidents **
******************/

rect.Party_Unaffiliated_Federalist { fill : #e8bfb1; }
rect.Party_Federalist { fill: #ea9978; }
rect.Party_Democratic-Republican { fill: #0044c9; }
rect.Party_National_Republican { fill: #0044c9; }
rect.Party_Democratic { fill: #0044c9; }
rect.Party_Whig { fill: #f0c862; }
rect.Party_Republican { fill: #e81b23; }

rect.border.Party_Unaffiliated_Federalist { fill: #c49e8a; }
rect.border.Party_Federalist { fill: #d47a51; }
rect.border.Party_Democratic-Republican { fill: #003399; }
rect.border.Party_National_Republican { fill: #003399; }
rect.border.Party_Democratic { fill: #003399; }
rect.border.Party_Whig { fill: #deb23b; }
rect.border.Party_Republican { fill: #b8141a; }

/*******************************
** British / English monarchs **
*******************************/

rect.House_of_Godwin.even,
rect.House_of_Wessex.even,
rect.House_of_Denmark.even { fill : #0c7c26; }
rect.House_of_Godwin.odd,
rect.House_of_Wessex.odd,
rect.House_of_Denmark.odd { fill : #55be6e; }
rect.House_of_Normandy.even,
rect.House_of_Blois.even { fill : #0e20a8; }
rect.House_of_Normandy.odd,
rect.House_of_Blois.odd { fill : #4152d2; }
rect.House_of_Plantagenet.even { fill : #0e3fa8; }
rect.House_of_Plantagenet.odd { fill : #3b65bf; }
rect.House_of_Lancaster.even { fill : #c82a22; }
rect.House_of_Lancaster.odd { fill : #e8615a; }
rect.House_of_York.even { fill : #d3b89a; }
rect.House_of_York.odd { fill : #b7a692; }
rect.House_of_Tudor.even { fill : #32a05e; }
rect.House_of_Tudor.odd { fill : #61c78a; }
rect.English_Interregnum.even { fill : #4e5099; }
rect.English_Interregnum.odd { fill : #696ba4; }
rect.House_of_Stuart.even { fill : #7710cb; }
rect.House_of_Stuart.odd { fill : #9c40e7; }
rect.House_of_Hanover.even { fill : #1005de; }
rect.House_of_Hanover.odd { fill : #4740d8; }
rect.House_of_Saxe-Coburg_and_Gotha.even,
rect.House_of_Windsor.even { fill : #d20c1f; }
rect.House_of_Saxe-Coburg_and_Gotha.odd,
rect.House_of_Windsor.odd { fill : #d13e4d; }

/*******************************
** Roman Late Republic Lives **
*******************************/



/*********************
** Final formatting **
*********************/

text.outside_label {
    fill: #000000;
}
</style>

<!-- Crop marks and debug elements -->
<g>
${debug_corners}
<!-- Top left crop marks -->
<g>
<rect fill="#000000" stroke="none" x="23" y="8" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="8" y="23" width="12" height="1"/>
</g>
<!-- Top right crop marks -->
<g>
<rect fill="#000000" stroke="none" x="1032" y="8" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="1036" y="23" width="12" height="1"/>
</g>
<!-- Bottom left crop marks -->
<g>
<rect fill="#000000" stroke="none" x="23" y="796" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="8" y="792" width="12" height="1"/>
</g>
<!-- Bottom right crop marks -->
<g>
<rect fill="#000000" stroke="none" x="1032" y="796" width="1" height="12"/>
<rect fill="#000000" stroke="none" x="1036" y="792" width="12" height="1"/>
</g>
</g>

<!-- Year labels and backgrounds -->
<g>
${year_labels}
</g>

<!-- Year markers at 50-year intervals -->
${year_markers}

<!-- Timeline boxes -->
<g>
${timeline_boxes}
</g>

</svg>
