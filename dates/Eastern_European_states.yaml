# Medieval-through-early-modern states of Eastern Europe and Russia
# (c. 833 CE – 1917 CE). Period spans only; dates are approximate and drawn
# from rough attested ranges. The "# CHECK" comment on uncertain labels marks
# dates that should be verified later.
# Colors alternate between two slate/steel-blue shades (#3a5a78 / #5e80a0).
# position: values group overlapping contemporaneous states onto separate
# rows (band ~17.5-22.5); they may need tuning after a first render.
# Note: Steppe/Mongol khanates (e.g. the Golden Horde) are intentionally
# omitted here as they already appear in Steppe_nomads.yaml.

