<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Interactive Historical Timeline</title>
<style>
    :root {
        --bg: #1a1c22;
        --panel: #23262f;
        --panel-2: #2b2f3a;
        --line: #3a3f4b;
        --text: #e7e9ee;
        --muted: #9aa0ac;
        --accent: #6ea8fe;
        --axis-bg: #14161b;
    }
    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        background: var(--bg); color: var(--text);
        font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
        font-size: 13px;
    }
    #app { display: flex; flex-direction: column; height: 100%; }

    /* ---- top toolbar ---- */
    #toolbar {
        flex: 0 0 auto; display: flex; align-items: center; gap: 12px;
        padding: 7px 12px; background: var(--panel);
        border-bottom: 1px solid var(--line); z-index: 30;
    }
    #toolbar .title { font-weight: 600; letter-spacing: .2px; }
    #toolbar .title small { color: var(--muted); font-weight: 400; }
    #toolbar label { display: flex; align-items: center; gap: 5px;
                     color: var(--muted); }
    #toolbar input {
        width: 120px; padding: 4px 7px; font-size: 13px; color: var(--text);
        background: var(--panel-2); border: 1px solid var(--line);
        border-radius: 5px;
    }
    #toolbar button {
        padding: 4px 11px; cursor: pointer; color: var(--text);
        background: var(--panel-2); border: 1px solid var(--line);
        border-radius: 5px; font-size: 13px;
    }
    #toolbar button:hover { background: #343a47; }
    #readout { margin-left: auto; color: var(--muted);
               font-variant-numeric: tabular-nums; }

    /* ---- main split ---- */
    #main { flex: 1 1 auto; display: flex; min-height: 0; }

    /* ---- left selector panel ---- */
    #panel {
        flex: 0 0 270px; background: var(--panel); border-right: 1px solid var(--line);
        display: flex; flex-direction: column; min-height: 0;
    }
    #panel.collapsed { flex-basis: 0; width: 0; overflow: hidden; border: none; }
    #panel-head {
        padding: 8px 12px; border-bottom: 1px solid var(--line);
        display: flex; align-items: center; gap: 8px;
    }
    #panel-head .ph-title { font-weight: 600; flex: 1; }
    #panel-head button {
        padding: 2px 7px; font-size: 11px; cursor: pointer; color: var(--muted);
        background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px;
    }
    #panel-head button:hover { color: var(--text); }
    #tree { overflow-y: auto; flex: 1 1 auto; padding: 4px 0 12px; }

    .theme { border-bottom: 1px solid var(--line); }
    .theme-row, .cat-row {
        display: flex; align-items: center; gap: 7px; padding: 5px 12px;
        cursor: pointer; user-select: none;
    }
    .theme-row:hover, .cat-row:hover { background: var(--panel-2); }
    .theme-row { font-weight: 600; }
    .caret { width: 12px; color: var(--muted); transition: transform .12s;
             font-size: 10px; flex: 0 0 12px; text-align: center; }
    .theme.collapsed .caret { transform: rotate(-90deg); }
    .theme.collapsed .cats { display: none; }
    .cat-row { padding-left: 30px; color: var(--muted); }
    .cat-row.on { color: var(--text); }
    .swatch { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 11px;
              box-shadow: inset 0 0 0 1px rgba(255,255,255,.12); }
    .cat-name { flex: 1 1 auto; white-space: nowrap; overflow: hidden;
                text-overflow: ellipsis; }
    .cat-count { color: var(--muted); font-size: 11px;
                 font-variant-numeric: tabular-nums; }
    .cb { width: 13px; height: 13px; flex: 0 0 13px; border-radius: 3px;
          border: 1px solid var(--line); background: var(--panel-2);
          display: inline-flex; align-items: center; justify-content: center;
          font-size: 10px; color: var(--bg); }
    .cb.on { background: var(--accent); border-color: var(--accent); }
    .cb.partial { background: #3a567f; border-color: var(--accent); }

    /* ---- timeline area ---- */
    #stage { flex: 1 1 auto; position: relative; min-width: 0; min-height: 0;
             overflow: hidden; }
    #viewport { position: absolute; inset: 0; top: 26px; left: 0;
                overflow: auto; cursor: grab; }
    #viewport.panning { cursor: grabbing; }
    #content { position: relative; }
    /* year axis overlay (top) */
    #axis { position: absolute; top: 0; left: 0; right: 0; height: 26px;
            background: var(--axis-bg); border-bottom: 1px solid var(--line);
            overflow: hidden; z-index: 12; pointer-events: none; }
    .tick { position: absolute; top: 0; height: 26px; }
    .tick .v { position: absolute; left: 0; top: 0; bottom: 0;
               width: 1px; background: var(--line); }
    .tick.major .v { background: #4d5462; }
    .tick .lbl { position: absolute; left: 4px; top: 6px; font-size: 11px;
                 color: var(--muted); white-space: nowrap;
                 font-variant-numeric: tabular-nums; }
    .tick.major .lbl { color: #c4c9d2; }
    /* vertical gridlines inside content */
    .grid { position: absolute; top: 0; width: 1px; background: rgba(255,255,255,.04); }
    .grid.major { background: rgba(255,255,255,.08); }

    /* category label overlay (left, inside stage) */
    #labels { position: absolute; top: 26px; left: 0; right: 0; bottom: 0;
              z-index: 11; pointer-events: none; overflow: hidden; }
    .band-label {
        position: absolute; left: 0; padding: 2px 8px 2px 10px;
        background: linear-gradient(90deg, var(--axis-bg) 70%, rgba(20,22,27,0));
        color: var(--text); font-size: 11px; font-weight: 600; white-space: nowrap;
        border-left: 3px solid var(--accent); pointer-events: auto; cursor: pointer;
        max-width: 220px; overflow: hidden; text-overflow: ellipsis;
    }
    .band-sep { position: absolute; left: 0; right: 0; height: 1px;
                background: var(--line); }

    /* bars */
    .bar {
        position: absolute; border-radius: 3px; overflow: hidden;
        display: flex; align-items: center; cursor: pointer;
        font-size: 11px; line-height: 1; white-space: nowrap;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
    }
    .bar .t { padding: 0 5px; overflow: hidden; text-overflow: ellipsis; }
    .bar.point { background: none !important; box-shadow: none;
                 overflow: visible; }
    .bar.point .mark { position: absolute; left: 0; top: 0; bottom: 0;
                       width: 2px; }
    .bar.point .t { position: absolute; left: 5px; top: 50%;
                    transform: translateY(-50%); color: var(--text);
                    text-shadow: 0 1px 2px rgba(0,0,0,.7); }
    .bar.dim { opacity: .22; }
    .bar.hot { box-shadow: inset 0 0 0 1px rgba(0,0,0,.18),
                           0 0 0 2px var(--accent); z-index: 5; }

    /* tooltip + pinned detail */
    #tooltip {
        position: fixed; z-index: 50; max-width: 280px; padding: 7px 10px;
        background: #0d0f13; border: 1px solid var(--line); border-radius: 7px;
        box-shadow: 0 6px 24px rgba(0,0,0,.5); pointer-events: none;
        display: none; font-size: 12px;
    }
    #tooltip .tt-name { font-weight: 600; margin-bottom: 3px; }
    #tooltip .tt-meta { color: var(--muted); }
    #tooltip .tt-cat { display: inline-flex; align-items: center; gap: 5px;
                       margin-top: 4px; }
    #empty { position: absolute; inset: 26px 0 0 0; display: flex;
             align-items: center; justify-content: center; color: var(--muted);
             text-align: center; padding: 0 40px; }
</style>
</head>
<body>
<div id='app'>
    <div id='toolbar'>
        <button id='toggle-panel' title='Show/hide categories'>&#9776;</button>
        <span class='title'>Historical Timeline <small>&mdash; interactive</small></span>
        <label>Go to year
            <input type='text' id='year-input' placeholder='1776 or 44 BCE'>
        </label>
        <button id='go'>Go</button>
        <span id='readout'>&mdash;</span>
    </div>
    <div id='main'>
        <div id='panel'>
            <div id='panel-head'>
                <span class='ph-title'>Categories</span>
                <button id='select-all'>All</button>
                <button id='select-none'>None</button>
            </div>
            <div id='tree'></div>
        </div>
        <div id='stage'>
            <div id='axis'></div>
            <div id='labels'></div>
            <div id='viewport'><div id='content'></div></div>
            <div id='empty' style='display:none'>
                No categories selected. Pick some from the panel on the left.
            </div>
        </div>
    </div>
</div>
<div id='tooltip'></div>

<script src='timeline_data.js'></script>
<script>
'use strict';

// ---- configuration -------------------------------------------------------
// Horizontal scale is fixed so a year always looks the same width. The system
// is written around this single constant so a future zoom control can simply
// change it and relayout; no UI exposes that yet.
const PX_PER_YEAR = 8;
const MIN_YEAR = -3600;
const MAX_YEAR = 2150;
const CONTENT_W = (MAX_YEAR - MIN_YEAR) * PX_PER_YEAR;

const LANE_H = 19;          // vertical size of one packed row
const BAND_PAD = 6;         // padding above/below the lanes in a band
const BAND_GAP = 6;         // gap drawn between bands
const RENDER_MARGIN = 600;  // px of off-screen bars to keep mounted

// Categories shown on first load (everything else is one click away). Chosen
// to span the eras without overwhelming a first-time visitor.
const DEFAULT_ON = new Set([
    'Roman emperors', 'US presidents', 'English monarchs', 'Byzantine Emperors',
    'Physicist lives', 'Composers', 'World events', 'Wars', 'Egyptian dynasties',
]);

const DATA = window.TIMELINE_DATA || [];

// ---- year <-> pixel helpers ----------------------------------------------
function xOf(year) { return (year - MIN_YEAR) * PX_PER_YEAR; }
function yearAtX(px) { return px / PX_PER_YEAR + MIN_YEAR; }

// Repo convention: there is no year 0. A signed value of -27 means 27 BCE
// (matches export_web_data.py, where 27 BCE -> start ≈ -26.96).
function yearDisplay(signed) {
    const r = Math.round(signed);
    if (r > 0) return r + ' CE';
    if (r === 0) return '1 BCE';   // boundary tick; year 0 does not exist
    return (-r) + ' BCE';
}

function parseYearInput(s) {
    if (s == null) return null;
    s = String(s).trim().toUpperCase();
    if (!s) return null;
    const m = s.match(/^(-?\d+)\s*(BCE|BC|CE|AD)?$/);
    if (!m) return null;
    let n = parseInt(m[1], 10);
    const suffix = m[2];
    if (suffix === 'BCE' || suffix === 'BC') return -Math.abs(n);
    return n;
}

// ---- group the data by theme -> category ---------------------------------
const byCategory = new Map();   // category -> {theme, items[], color}
const byTheme = new Map();      // theme -> [category,...]
for (const rec of DATA) {
    if (!byCategory.has(rec.category)) {
        byCategory.set(rec.category, {
            theme: rec.theme, items: [], color: rec.color
        });
        if (!byTheme.has(rec.theme)) byTheme.set(rec.theme, []);
        byTheme.get(rec.theme).push(rec.category);
    }
    byCategory.get(rec.category).items.push(rec);
}

const visible = new Set();   // category names currently shown
for (const c of byCategory.keys()) if (DEFAULT_ON.has(c)) visible.add(c);
if (!visible.size) {         // fall back to first theme if names drift
    const first = [...byTheme.values()][0] || [];
    first.forEach(c => visible.add(c));
}

// ---- contrast helper for bar text ----------------------------------------
function textColorFor(hex) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substr(0, 2), 16);
    const g = parseInt(h.substr(2, 2), 16);
    const b = parseInt(h.substr(4, 2), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.62 ? '#1a1c22' : '#ffffff';
}

// ==========================================================================
// LAYOUT  — recomputed whenever the visible set changes. Each visible
// category becomes a horizontal band; entries within it are packed into as
// few lanes as possible so nothing overlaps, and bands stack top to bottom.
// ==========================================================================
let bands = [];          // {category, color, top, height, items:[{rec,lane,...}]}
let placed = [];         // flat list of placed bars for fast virtualization
let totalHeight = 0;

function minLabelYears() { return 96 / PX_PER_YEAR; }

function packLanes(items) {
    // Greedy interval packing. Point events reserve room for their label so
    // labels to the right of a marker do not collide with the next event.
    const sorted = items.slice().sort((a, b) => a.start - b.start);
    const laneEnds = [];          // effective end-year occupied per lane
    const out = [];
    const labelYears = minLabelYears();
    for (const rec of sorted) {
        const effEnd = rec.point
            ? rec.start + labelYears
            : Math.max(rec.end, rec.start + 0.25);
        let lane = -1;
        for (let i = 0; i < laneEnds.length; i++) {
            if (laneEnds[i] <= rec.start + 0.01) { lane = i; break; }
        }
        if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
        laneEnds[lane] = effEnd;
        out.push({ rec, lane });
    }
    return { placed: out, lanes: laneEnds.length };
}

function relayout() {
    bands = [];
    placed = [];
    let top = 0;
    // Keep themes and categories in a stable, grouped order.
    for (const [theme, cats] of byTheme) {
        for (const category of cats) {
            if (!visible.has(category)) continue;
            const info = byCategory.get(category);
            const { placed: laneItems, lanes } = packLanes(info.items);
            const height = lanes * LANE_H + BAND_PAD * 2;
            const band = { category, theme, color: info.color, top, height,
                           lanes, items: [] };
            for (const li of laneItems) {
                const rec = li.rec;
                const bx = xOf(rec.start);
                const bw = rec.point ? 0 : Math.max(2, (rec.end - rec.start) * PX_PER_YEAR);
                const by = top + BAND_PAD + li.lane * LANE_H;
                const p = { rec, x: bx, w: bw, y: by, h: LANE_H - 3,
                            band, el: null };
                band.items.push(p);
                placed.push(p);
            }
            bands.push(band);
            top += height + BAND_GAP;
        }
    }
    totalHeight = Math.max(top, 1);
    const content = document.getElementById('content');
    content.style.width = CONTENT_W + 'px';
    content.style.height = totalHeight + 'px';
    // Reset mounted elements (they will be recreated on render).
    content.querySelectorAll('.bar').forEach(e => e.remove());
    for (const p of placed) p.el = null;
    document.getElementById('empty').style.display = visible.size ? 'none' : 'flex';
    renderGrid();
    renderBars(true);
    renderAxis();
    renderLabels();
}

// ==========================================================================
// RENDERING — virtualized. Only bars within the horizontal viewport window
// (plus a margin) are kept in the DOM.
// ==========================================================================
const viewport = document.getElementById('viewport');
const content = document.getElementById('content');
const axis = document.getElementById('axis');
const labels = document.getElementById('labels');
const tooltip = document.getElementById('tooltip');

let hotRec = null;       // pinned/hovered record for highlighting

function renderBars(force) {
    const left = viewport.scrollLeft - RENDER_MARGIN;
    const right = viewport.scrollLeft + viewport.clientWidth + RENDER_MARGIN;
    const top = viewport.scrollTop - RENDER_MARGIN;
    const bottom = viewport.scrollTop + viewport.clientHeight + RENDER_MARGIN;

    for (const p of placed) {
        const inX = (p.x + Math.max(p.w, 80)) >= left && p.x <= right;
        const inY = (p.y + p.h) >= top && p.y <= bottom;
        const show = inX && inY;
        if (show && !p.el) {
            mountBar(p);
        } else if (!show && p.el) {
            p.el.remove();
            p.el = null;
        }
    }
    if (force) applyHot();
}

function mountBar(p) {
    const rec = p.rec;
    const el = document.createElement('div');
    el.style.left = p.x + 'px';
    el.style.top = p.y + 'px';
    el.style.height = p.h + 'px';
    if (rec.point) {
        el.className = 'bar point';
        const mark = document.createElement('div');
        mark.className = 'mark';
        mark.style.background = rec.color;
        el.appendChild(mark);
        const t = document.createElement('span');
        t.className = 't';
        t.textContent = rec.label;
        el.appendChild(t);
    } else {
        el.className = 'bar';
        el.style.width = p.w + 'px';
        el.style.background = rec.color;
        if (p.w > 26) {
            const t = document.createElement('span');
            t.className = 't';
            t.style.color = textColorFor(rec.color);
            t.textContent = rec.label;
            el.appendChild(t);
        }
    }
    el.addEventListener('mouseenter', e => showTooltip(rec, e));
    el.addEventListener('mousemove', moveTooltip);
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('click', ev => { ev.stopPropagation(); pin(rec); });
    p.el = el;
    if (hotRec && rec === hotRec) el.classList.add('hot');
    content.appendChild(el);
}

// vertical gridlines aligned with the axis ticks
let gridStep = 0;
function renderGrid() {
    content.querySelectorAll('.grid').forEach(e => e.remove());
    const step = chooseStep();
    gridStep = step;
    const frag = document.createDocumentFragment();
    for (let y = Math.ceil(MIN_YEAR / step) * step; y <= MAX_YEAR; y += step) {
        const g = document.createElement('div');
        g.className = 'grid' + (y % (step * 5) === 0 ? ' major' : '');
        g.style.left = xOf(y) + 'px';
        g.style.height = totalHeight + 'px';
        frag.appendChild(g);
    }
    content.appendChild(frag);
}

function chooseStep() {
    // Aim for ticks ~90px apart given the fixed scale.
    const target = 90 / PX_PER_YEAR;
    const steps = [1, 2, 5, 10, 20, 25, 50, 100, 200, 250, 500, 1000];
    for (const s of steps) if (s >= target) return s;
    return 1000;
}

function renderAxis() {
    const step = gridStep || chooseStep();
    axis.innerHTML = '';
    const sl = viewport.scrollLeft;
    const w = viewport.clientWidth;
    const firstYear = Math.floor(yearAtX(sl) / step) * step;
    const frag = document.createDocumentFragment();
    for (let y = firstYear; xOf(y) - sl <= w + 60; y += step) {
        if (y < MIN_YEAR) continue;
        const t = document.createElement('div');
        const major = y % (step * 5) === 0;
        t.className = 'tick' + (major ? ' major' : '');
        t.style.left = (xOf(y) - sl) + 'px';
        const v = document.createElement('div'); v.className = 'v';
        t.appendChild(v);
        if (major || step <= 25) {
            const lbl = document.createElement('div');
            lbl.className = 'lbl';
            lbl.textContent = yearDisplay(y);
            t.appendChild(lbl);
        }
        frag.appendChild(t);
    }
    axis.appendChild(frag);
}

function renderLabels() {
    labels.innerHTML = '';
    const st = viewport.scrollTop;
    const frag = document.createDocumentFragment();
    for (const band of bands) {
        const sep = document.createElement('div');
        sep.className = 'band-sep';
        sep.style.top = (band.top - st - BAND_GAP / 2) + 'px';
        frag.appendChild(sep);

        const lab = document.createElement('div');
        lab.className = 'band-label';
        lab.style.top = (band.top - st + 2) + 'px';
        lab.style.borderLeftColor = band.color;
        lab.textContent = band.category;
        lab.title = band.category + ' — click to hide';
        lab.addEventListener('click', () => { toggleCategory(band.category, false); });
        frag.appendChild(lab);
    }
    labels.appendChild(frag);
}

// ---- tooltip + pinning ---------------------------------------------------
function showTooltip(rec, e) {
    const span = rec.point
        ? rec.startLabel
        : rec.startLabel + '  →  ' + rec.endLabel;
    tooltip.innerHTML =
        '<div class="tt-name"></div>' +
        '<div class="tt-meta"></div>' +
        '<div class="tt-cat"><span class="swatch"></span><span></span></div>';
    tooltip.querySelector('.tt-name').textContent = rec.label;
    tooltip.querySelector('.tt-meta').textContent = span;
    tooltip.querySelector('.tt-cat .swatch').style.background = rec.color;
    tooltip.querySelector('.tt-cat span:last-child').textContent =
        rec.category + ' · ' + rec.theme;
    tooltip.style.display = 'block';
    moveTooltip(e);
}
function moveTooltip(e) {
    const pad = 14;
    let x = e.clientX + pad, y = e.clientY + pad;
    const r = tooltip.getBoundingClientRect();
    if (x + r.width > window.innerWidth) x = e.clientX - r.width - pad;
    if (y + r.height > window.innerHeight) y = e.clientY - r.height - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

function pin(rec) {
    hotRec = (hotRec === rec) ? null : rec;
    applyHot();
}
function applyHot() {
    for (const p of placed) {
        if (!p.el) continue;
        p.el.classList.toggle('hot', hotRec != null && p.rec === hotRec);
    }
}

// ==========================================================================
// CATEGORY SELECTOR PANEL
// ==========================================================================
const tree = document.getElementById('tree');

function buildTree() {
    tree.innerHTML = '';
    for (const [theme, cats] of byTheme) {
        const themeEl = document.createElement('div');
        themeEl.className = 'theme';
        themeEl.dataset.theme = theme;

        const row = document.createElement('div');
        row.className = 'theme-row';
        row.innerHTML = '<span class="caret">&#9660;</span>' +
                        '<span class="cb"></span>' +
                        '<span style="flex:1">' + theme + '</span>' +
                        '<span class="cat-count"></span>';
        themeEl.appendChild(row);

        const catsWrap = document.createElement('div');
        catsWrap.className = 'cats';
        let total = 0;
        for (const category of cats) {
            const info = byCategory.get(category);
            total += info.items.length;
            const c = document.createElement('div');
            c.className = 'cat-row';
            c.dataset.category = category;
            c.innerHTML =
                '<span class="cb"></span>' +
                '<span class="swatch"></span>' +
                '<span class="cat-name"></span>' +
                '<span class="cat-count">' + info.items.length + '</span>';
            c.querySelector('.swatch').style.background = info.color;
            c.querySelector('.cat-name').textContent = category;
            c.addEventListener('click', () => toggleCategory(category));
            catsWrap.appendChild(c);
        }
        row.querySelector('.cat-count').textContent = total;
        themeEl.appendChild(catsWrap);

        // caret toggles collapse; clicking the rest toggles the whole theme
        row.querySelector('.caret').addEventListener('click', e => {
            e.stopPropagation();
            themeEl.classList.toggle('collapsed');
        });
        row.addEventListener('click', () => toggleTheme(theme));

        tree.appendChild(themeEl);
    }
    syncTree();
}

function toggleCategory(category, relayoutNow = true) {
    if (visible.has(category)) visible.delete(category);
    else visible.add(category);
    syncTree();
    if (relayoutNow) relayout();
}

function toggleTheme(theme) {
    const cats = byTheme.get(theme);
    const allOn = cats.every(c => visible.has(c));
    for (const c of cats) { if (allOn) visible.delete(c); else visible.add(c); }
    syncTree();
    relayout();
}

function syncTree() {
    for (const themeEl of tree.children) {
        const theme = themeEl.dataset.theme;
        const cats = byTheme.get(theme);
        let on = 0;
        for (const c of themeEl.querySelectorAll('.cat-row')) {
            const isOn = visible.has(c.dataset.category);
            if (isOn) on++;
            c.classList.toggle('on', isOn);
            const cb = c.querySelector('.cb');
            cb.classList.toggle('on', isOn);
            cb.innerHTML = isOn ? '&#10003;' : '';
        }
        const cb = themeEl.querySelector('.theme-row .cb');
        cb.classList.toggle('on', on === cats.length);
        cb.classList.toggle('partial', on > 0 && on < cats.length);
        cb.innerHTML = on === cats.length ? '&#10003;' : (on > 0 ? '&minus;' : '');
    }
}

// ==========================================================================
// NAVIGATION
// ==========================================================================
function centerOnYear(year) {
    viewport.scrollLeft = xOf(year) - viewport.clientWidth / 2;
    onScroll();
}

function updateReadout() {
    const centerYear = yearAtX(viewport.scrollLeft + viewport.clientWidth / 2);
    document.getElementById('readout').textContent =
        'Center: ' + yearDisplay(centerYear);
}

let scrollRAF = null;
function onScroll() {
    if (scrollRAF) return;
    scrollRAF = requestAnimationFrame(() => {
        scrollRAF = null;
        renderBars(false);
        renderAxis();
        renderLabels();
        updateReadout();
    });
}
viewport.addEventListener('scroll', onScroll);

// wheel: vertical wheel pans horizontally unless there is real vertical room
viewport.addEventListener('wheel', e => {
    const canScrollY = content.offsetHeight > viewport.clientHeight;
    if (!e.shiftKey && Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
        if (!canScrollY || e.altKey) {
            viewport.scrollLeft += e.deltaY;
            e.preventDefault();
        }
    }
    if (e.shiftKey) { viewport.scrollLeft += e.deltaY; e.preventDefault(); }
}, { passive: false });

// click-drag to pan
let dragging = false, dragX = 0, dragY = 0, dragSL = 0, dragST = 0, moved = false;
viewport.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true; moved = false;
    dragX = e.clientX; dragY = e.clientY;
    dragSL = viewport.scrollLeft; dragST = viewport.scrollTop;
    viewport.classList.add('panning');
});
window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - dragX, dy = e.clientY - dragY;
    if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
    viewport.scrollLeft = dragSL - dx;
    viewport.scrollTop = dragST - dy;
});
window.addEventListener('mouseup', () => {
    dragging = false; viewport.classList.remove('panning');
});
// a drag should not also count as a click that pins a bar
viewport.addEventListener('click', e => { if (moved) e.stopPropagation(); }, true);
viewport.addEventListener('click', e => {
    if (e.target === viewport || e.target === content) { hotRec = null; applyHot(); }
});

// keyboard: arrows pan, +/- reserved for future zoom
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const page = viewport.clientWidth * 0.8;
    if (e.key === 'ArrowLeft') { viewport.scrollLeft -= 120; onScroll(); }
    else if (e.key === 'ArrowRight') { viewport.scrollLeft += 120; onScroll(); }
    else if (e.key === 'PageUp') { viewport.scrollLeft -= page; onScroll(); }
    else if (e.key === 'PageDown') { viewport.scrollLeft += page; onScroll(); }
});

function go() {
    const y = parseYearInput(document.getElementById('year-input').value);
    if (y != null) centerOnYear(y);
}
document.getElementById('go').addEventListener('click', go);
document.getElementById('year-input').addEventListener('keydown',
    e => { if (e.key === 'Enter') go(); });

document.getElementById('toggle-panel').addEventListener('click', () => {
    document.getElementById('panel').classList.toggle('collapsed');
    onScroll();
});
document.getElementById('select-all').addEventListener('click', () => {
    for (const c of byCategory.keys()) visible.add(c);
    syncTree(); relayout();
});
document.getElementById('select-none').addEventListener('click', () => {
    visible.clear(); syncTree(); relayout();
});

window.addEventListener('resize', onScroll);

// ---- init ----------------------------------------------------------------
buildTree();
relayout();

const params = new URLSearchParams(location.search);
let startYear = 1700;
if (params.has('year')) {
    const y = parseYearInput(params.get('year'));
    if (y != null) startYear = y;
}
// Center after layout so clientWidth is known.
requestAnimationFrame(() => { centerOnYear(startYear); });
</script>
