# Ancient Eastern Mediterranean and Anatolian civilizations (period spans),
# c. 1900 BCE - 146 BCE. Excludes Egypt, Greece (lives), Achaemenid Persia,
# Rome, the Steppe peoples, and the Israelite/Judahite kingdoms, which are
# covered in other files; Minoan and Mycenaean CIVILIZATION periods are
# included here since only Greek lives are covered elsewhere.
# Dates are approximate and drawn from rough attested/conventional ranges;
# the "# CHECK" comment on a Label marks dates that should be verified later.
# position: values stagger time-overlapping spans onto separate rows so the
# bars do not collide; they may need tuning after a first render.

entries:

