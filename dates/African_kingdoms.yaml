# Kingdoms and empires of Africa beyond Egypt (period spans).
# Dates are approximate and drawn from rough attested ranges; the "# CHECK"
# comment marks dates and labels that should be verified later.
# Egypt, Carthage/Rome, and Saharan/Mediterranean polities already covered
# elsewhere are intentionally omitted. Sub-Saharan coverage is partial.
# Colors alternate between two warm savanna amber/earth shades.
# position: values stagger overlapping (contemporaneous) kingdoms onto
# separate rows; they may need tuning after a first render.

