<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="1056" height="816" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>
rect { stroke: none; }

text.Reign,
text.Life,
text.War,
text.Dynasty {
    text-anchor: middle;
    dominant-baseline: middle;
    }
text.Reign,
text.Life,
text.War,
text.Dynasty {
    font-family: Palatino;
    fill: #ffffff;
    }

/******************
** US presidents **
******************/

rect.Party_Unaffiliated_Federalist { fill : #e8bfb1; }
rect.Party_Federalist { fill: #ea9978; }
rect.Party_Democratic-Republican { fill: #0044c9; }
rect.Party_National_Republican { fill: #0044c9; }
rect.Party_Democratic { fill: #0044c9; }
rect.Party_Whig { fill: #f0c862; }
rect.Party_Republican { fill: #e81b23; }

rect.border.Party_Unaffiliated_Federalist { fill: #c49e8a; }
rect.border.Party_Federalist { fill: #d47a51; }
rect.border.Party_Democratic-Republican { fill: #003399; }
rect.border.Party_National_Republican { fill: #003399; }
rect.border.Party_Democratic { fill: #003399; }
rect.border.Party_Whig { fill: #deb23b; }
rect.border.Party_Republican { fill: #b8141a; }

/*******************************
** British / English monarchs **
*******************************/

rect.House_of_Godwin.even,
rect.House_of_Wessex.even,
rect.House_of_Denmark.even { fill : #1f7a3d; }
rect.House_of_Godwin.odd,
rect.House_of_Wessex.odd,
rect.House_of_Denmark.odd { fill : #4caf6e; }
rect.House_of_Normandy.even,
rect.House_of_Blois.even { fill : #234a9e; }
rect.House_of_Normandy.odd,
rect.House_of_Blois.odd { fill : #5570c6; }
rect.House_of_Plantagenet.even { fill : #5b3a86; }
rect.House_of_Plantagenet.odd { fill : #8261ad; }
rect.House_of_Lancaster.even { fill : #b3242e; }
rect.House_of_Lancaster.odd { fill : #d6545d; }
rect.House_of_York.even { fill : #c9a24a; }
rect.House_of_York.odd { fill : #e0c074; }
rect.House_of_Tudor.even { fill : #2e8b57; }
rect.House_of_Tudor.odd { fill : #5cb585; }
rect.English_Interregnum.even { fill : #4a4d99; }
rect.English_Interregnum.odd { fill : #7174b8; }
rect.House_of_Stuart.even { fill : #6a1ea8; }
rect.House_of_Stuart.odd { fill : #9148cf; }
rect.House_of_Hanover.even { fill : #1746c4; }
rect.House_of_Hanover.odd { fill : #4a72de; }
rect.House_of_Saxe-Coburg_and_Gotha.even,
rect.House_of_Windsor.even { fill : #c01526; }
rect.House_of_Saxe-Coburg_and_Gotha.odd,
rect.House_of_Windsor.odd { fill : #d8424f; }

/******************
** English lives **
******************/

rect.England.Life { fill : #3aa76a; }

/*******************************
** Kings of Judah **
*******************************/

rect.House_of_David.even { fill : #1f4fd0; }
rect.House_of_David.odd { fill : #4f74dc; }
rect.House_of_David.Unconfirmed.even { fill : #aebfe8; }
rect.House_of_David.Unconfirmed.odd { fill : #cdd7f0; }

