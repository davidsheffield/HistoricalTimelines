# Historical states and dynasties of Korea (Gojoseon through the Korean
# Empire, c. -0300 – 1910 CE). Dates are approximate; early states such as
# Gojoseon have legendary founding traditions (2333 BCE) and the spans here
# follow the rough historically attested ranges. The "# CHECK" comment marks
# labels whose dates should be verified later.
# The Three Kingdoms (Goguryeo, Baekje, Silla) and the Gaya confederacy were
# contemporaneous, and Balhae overlapped Unified Silla; these are staggered
# onto separate position rows so the bars do not collide.

entries:

- Label: Gojoseon  # CHECK
  Start: c. -0300
  End: -0108
  Params:
    - position:8.5
    - fill:#2f4b8a;

