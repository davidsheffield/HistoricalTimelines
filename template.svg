rect.House_of_Jehu.odd { fill: #46915f; }
rect.House_of_Shallum.even { fill: #8a7a1a; }
rect.House_of_Shallum.odd { fill: #aa9a3e; }
rect.House_of_Menahem.even { fill: #1f6e6e; }
rect.House_of_Menahem.odd { fill: #46918f; }
rect.House_of_Pekah.even { fill: #7a2244; }
rect.House_of_Pekah.odd { fill: #9c4467; }
rect.House_of_Hoshea.even { fill: #5a6e1f; }
rect.House_of_Hoshea.odd { fill: #7d9146; }

