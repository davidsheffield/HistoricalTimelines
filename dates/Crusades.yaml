# The Crusades as period spans (c. 1096-1444 CE): the numbered Levantine
# crusades (First through Ninth) plus notable named crusades. The Reconquista
# and general medieval wars live in other files (Medieval_wars.yaml,
# Battles.yaml) and are not duplicated here.
# Base band ~16.5-18.5. Near-contemporaneous campaigns (e.g. the People's
# Crusade with the First, and the Albigensian / Children's Crusades during the
# Fourth-Fifth) are staggered onto adjacent rows so the bars do not collide.
# Each entry carries a single cross-red fill for a consistent look.
# "# CHECK" marks dates that should be verified later.
