# Achaemenid rulers (705–330 BC)
# Early rulers attested only by Behistun Inscription; dates are legendary.
# Wikipedia dates: Achaemenes ~705 BC, Teispes ~640 BC, Cyrus I ~580 BC,
# Cambyses I ~550 BC. These are treated as rough attested dates; start/end
# ranges are estimated to give sequential, non-overlapping spans.

- Label: Achaemenes
  Start: c. -0705
  End: c. -0640
  Keywords:
    - Achaemenid_Dynasty
    - Unconfirmed

- Label: Teispes
  Start: c. -0640
  End: c. -0600
  Keywords:
    - Achaemenid_Dynasty
    - Unconfirmed

- Label: Cyrus I
  Start: c. -0600
  End: c. -0580
  Keywords:
    - Achaemenid_Dynasty

# Cambyses I: Wikipedia gives ~550 BC but Cyrus II's reign began c. 559 BC;
# dates adjusted to maintain sequential order.
- Label: Cambyses I
  Start: c. -0580
  End: c. -0559
  Keywords:
    - Achaemenid_Dynasty

