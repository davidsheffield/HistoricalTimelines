# Kingdoms and empires of mainland and maritime Southeast Asia
# (c. 1st century CE – 19th century). Dates are approximate and drawn from
# rough attested ranges; the "# CHECK" comment on a label marks dates that
# should be verified later. Fills alternate between two olive/jade shades
# (#6a8d2f / #8fae54) down the list. position: values stagger overlapping
# contemporaneous polities onto separate rows (band ~23.5–27.5) so the bars
# do not collide; they may need tuning after a first render.
# Note: China, Mongols/Steppe peoples, and India are covered elsewhere and
# are intentionally omitted here.

