global:
  Keywords:
    - World
    - Event
  Params:
    - position:13

# Iconic single-moment turning points in world history, rendered as point
# markers (a single `Date:` each, not Start/End spans). This is the "famous
# moments" layer: coronations, foundings, proclamations, and other singular
# events. Battles live in Battles.yaml and reign/war spans live elsewhere, so
# they are not duplicated here.
#
# Dates use extended ISO 8601 with negative, zero-padded years for BCE. Full
# dates are given where firmly known; year-only otherwise. The "c. " prefix
# marks approximate/traditional dates. Where several events cluster in time,
# their `position:` values are staggered (13/11/15/...) so labels do not
# overlap, the same way Battles.yaml staggers the Revolutionary War battles.
# "# CHECK" marks genuinely uncertain or traditional dates.

entries:
